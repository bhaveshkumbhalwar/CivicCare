<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Administrative access to Smart Civic Portal.">
  <title>Admin Portal | Smart Civic Portal</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/theme.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    .admin-mesh {
      background-color: #0f172a;
      background-image: radial-gradient(at 0% 0%, hsla(221,83%,53%,0.15) 0, transparent 50%), 
                        radial-gradient(at 50% 0%, hsla(339,81%,60%,0.1) 0, transparent 50%);
      position: relative;
      overflow: hidden;
    }
  </style>
</head>
<body style="background: var(--bg-body); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; margin: 0;">
  <div style="width: 100%; max-width: 500px; background: var(--bg-card); padding: 3.5rem; border-radius: 24px; border: 1px solid var(--border-color); box-shadow: var(--shadow-premium); position: relative; transition: var(--transition-theme); z-index: 10;">
    <div style="position: absolute; top: -4.5rem; left: 0; right: 0; display: flex; justify-content: center;">
      <div style="width: 85px; height: 85px; background: #0f172a; border-radius: 24px; display: flex; align-items: center; justify-content: center; box-shadow: 0 15px 30px rgba(15, 23, 42, 0.3); border: 2px solid rgba(255,255,255,0.1);">
        <i class="ph-fill ph-shield-check" style="font-size: 2.75rem; color: #f43f5e;"></i>
      </div>
    </div>

    <div style="position: absolute; top: 1.5rem; right: 1.5rem;">
      <button onclick="theme.toggle()" class="theme-toggle-btn" aria-label="Toggle Theme" style="background: var(--bg-body); border: 1px solid var(--border-color); cursor: pointer; color: var(--text-secondary); width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; transition: all 0.2s;"><i class="ph ph-moon"></i></button>
    </div>

    <div style="text-align: center; margin-bottom: 3rem; margin-top: 1rem;">
      <h2 style="font-size: 2.25rem; font-weight: 900; color: var(--text-main); letter-spacing: -0.02em;">Admin Access</h2>
      <p style="color: var(--text-secondary); font-size: 1.1rem; margin-top: 10px;">Authorized personnel authentication system.</p>
    </div>

    <div id="errorAlert" class="toast toast-error" style="margin-bottom: 2rem; position: static; width: 100%; transform: none; display: none;">
      <i class="ph ph-warning-circle"></i>
      <span id="errorMessage"></span>
    </div>

    <form id="adminAuthForm" style="display: flex; flex-direction: column; gap: 1.75rem;">
      <div class="form-group">
        <label class="form-label" style="font-weight: 800; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary);">Official Identifier</label>
        <div style="position: relative;">
          <i class="ph ph-envelope-simple" style="position: absolute; left: 16px; top: 16px; color: var(--text-secondary);"></i>
          <input type="email" id="email" class="input-glow" placeholder="approver@department.gov" required style="padding-left: 48px; border-radius: 14px; padding-top: 16px; padding-bottom: 16px; background: var(--bg-input); font-size: 1rem; border: 1.5px solid var(--border-color); width: 100%; color: var(--text-main);">
        </div>
      </div>
      
      <div class="form-group">
        <label class="form-label" style="font-weight: 800; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary);">Security Key</label>
        <div style="position: relative;">
          <i class="ph ph-lock-key" style="position: absolute; left: 16px; top: 16px; color: var(--text-secondary);"></i>
          <input type="password" id="password" class="input-glow" placeholder="••••••••" required style="padding-left: 48px; border-radius: 14px; padding-top: 16px; padding-bottom: 16px; background: var(--bg-input); font-size: 1rem; border: 1.5px solid var(--border-color); width: 100%; color: var(--text-main);">
        </div>
      </div>
      
      <button type="submit" class="btn btn-primary" id="submitBtn" style="width: 100%; padding: 18px; margin-top: 1rem; background: #0f172a; color: white; border: none; border-radius: 16px; font-weight: 800; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; gap: 12px; box-shadow: 0 15px 30px rgba(15, 23, 42, 0.2); cursor: pointer; transition: all 0.3s;">
        <span>Unlock Dashboard</span>
        <i class="ph-bold ph-shield-check" style="font-size: 1.3rem;"></i>
      </button>
    </form>

    <div style="margin-top: 3.5rem; text-align: center; border-top: 1.5px solid var(--border-color); padding-top: 2rem;">
      <a href="/login.html" style="color: var(--text-secondary); text-decoration: none; font-size: 1rem; display: inline-flex; align-items: center; justify-content: center; gap: 10px; font-weight: 700; transition: color 0.2s;">
        <i class="ph ph-arrow-left"></i> Return to Citizen Portal
      </a>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    if (auth.isAuthenticated()) window.location.href = '/';
    const authForm = document.getElementById('adminAuthForm');
    const errorAlert = document.getElementById('errorAlert');
    const errorMessage = document.getElementById('errorMessage');
    const submitBtn = document.getElementById('submitBtn');
    authForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      errorAlert.style.display = 'none';
      submitBtn.disabled = true;
      const original = submitBtn.innerHTML;
      submitBtn.innerHTML = '<span>Verifying Access...</span>';
      try {
        await auth.login(email, password, 'admin');
        window.location.href = '/';
      } catch (err) {
        errorMessage.textContent = err.message || 'Access denied.';
        errorAlert.style.display = 'flex';
        errorAlert.classList.add('show');
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = original;
      }
    });
  </script>
</body>
</html>
